# 三级修订约束规则配置
# revision-rules.yaml
# 独立于主流水线，不改动原有业务文件

version: 2
description: |
  三级存量修订模式约束规则。
  Phase0-Phase1 禁用；Phase2设定固化后永久解锁。
  强制自上而下执行：基础设定修订 -> 大纲修订 -> 正文修订，禁止逆向修改。

# ============================================================
# 全局约束
# ============================================================
global_constraints:
  # 03-写作计划.json 中记录的用户原始顶层约束，修订时禁止隐性篡改
  locked_top_level_fields:
    - opening_background      # Q1 开篇背景
    - story_ending            # Q2 故事结局
    - volume_outline          # Q3 卷纲
    - ability_path            # Q4 主角能力/修为提升路径
    - core_conflict           # Q5 故事全局核心矛盾

  # 修订时强制核验的一致性锚点
  consistency_anchors:
    - ability_path            # 主角能力提升路径
    - core_conflict           # 主线核心矛盾
    - character_core_traits   # 角色核心人设（性格/缺陷/说话风格）
    - worldview_bottom_layer  # 世界观底层框架（力量规则/世界禁忌）

  # 层级间刚性约束：下层修订不得反向篡改上层基础设定
  hierarchy_rule: |
    基础设定(00-世界观 + 01-人物卡) 为顶层
    大纲体系(02-大纲/)              为中层
    正文章节(第XX章-*.md)           为底层
    底层修订不得修改顶层设定；中层修订不得修改顶层设定。
    顶层修订完成后，必须标记下游冲突节点。

# ============================================================
# 模式一：基础设定扫描更新模式（顶层修订）
# ============================================================
mode_1_basic_settings:
  scope:
    - "00-世界观.md"
    - "01-人物卡/主角.md"
    - "01-人物卡/重要角色.md"
    - "01-人物卡/次要角色.md"
    - "01-人物卡/重要反派.md"
    - "01-人物卡/次要反派.md"

  pre_scan_items:
    - name: "设定内部逻辑冲突"
      check:
        - 世界观力量体系规则是否自洽
        - 角色固有属性是否与世界观匹配
        - 势力关系是否矛盾
    - name: "能力路径匹配度"
      check:
        - 主角能力提升规则与人设是否匹配
        - 主角能力提升规则与世界观底层规则是否兼容
    - name: "下游一致性偏差"
      check:
        - 设定与02大纲是否存在矛盾
        - 设定与已生成正文是否存在冲突
        - 设定与主线核心矛盾是否偏离

  output: "基础设定差异简报（标注冲突位置与影响范围）"

  modification_boundaries:
    allowed:
      - 局部微调（细节补充/措辞优化）
      - 细则增补（新增设定细节，不矛盾）
      - 冗余删减（删除重复/过时内容）
      - 逻辑修正（修复内部矛盾）
    forbidden:
      - 颠覆性推翻世界观底层框架
      - 颠覆性修改角色核心人设（性格核心/致命缺陷/人物弧光方向）
    escalation: |
      颠覆性修改需求 → 提示用户重启Phase1新建项目，不支持存量强行改写

  downstream_sync:
    - 标记02大纲中受影响的冲突节点
    - 标记受影响的已生成正文章节
    - 提示用户后续执行大纲/正文一致性修复

# ============================================================
# 模式二：大纲体系扫描更新模式（中层修订）
# ============================================================
mode_2_outline_system:
  scope:
    - "02-大纲/卷纲.md"
    - "02-大纲/时间线.md"
    - "02-大纲/伏笔布局.md"
    - "02-大纲/进阶条件.md"
    - "02-大纲/成长体系.md"
    - "02-大纲/境界功法.md"

  pre_scan_items:
    - name: "世界观违规"
      check: "大纲是否违背当前最新版世界观规则"
    - name: "能力路径偏离"
      check: "角色成长路径是否偏离用户指定的能力提升逻辑"
    - name: "人设冲突"
      check: "大纲事件/行为是否与人物卡核心设定冲突"
    - name: "伏笔时间线错位"
      check: "伏笔排布时间节点是否与时间线自洽"
    - name: "支线消解主线"
      check: "支线剧情是否消解主线核心矛盾"

  output: "大纲违规清单（五类违规项逐条列出）"

  modification_boundaries:
    allowed:
      - 章节增删
      - 分卷合并/拆分
      - 时间线偏移
      - 伏笔增减
      - 双轨成长节点调整
    forbidden:
      - 私自新增势力/功法/角色权限（未在世界观中定义）
      - 绕过顶层设定隐性改参
    rigid_constraint: |
      所有大纲修改必须贴合当前最新版世界观、人物卡

  downstream_sync:
    - 更新 03-写作计划.json（章节列表/标题/总数）
    - 更新全局伏笔追踪表
    - 刷新 L1 阶段总结索引（如受影响阶段已完成）

# ============================================================
# 模式三：正文双分支更新修订模式（底层修订）
# ============================================================
mode_3_chapter_revision:
  scope: "已产出章节文件（第XX章-*.md）"

  # 两个分支互斥，不可并行执行
  branch_mutex: true

  # 共用前置：三层记忆合规校验 + Phase4五维校验标准
  shared_precheck:
    - 加载最新 L1 阶段总结
    - 加载相关 L2 章节记忆
    - 加载目标章节 L3 全文
    - 复用 Phase4 校验标准（字数/伏笔/时间线/人设/文风）

  branch_1_structural:
    name: "剧情结构性修改"
    description: "改动章节事件因果、人物临场行为、对话内核、伏笔埋设/回收、支线动线"
    compliance:
      - 对齐顶层世界观
      - 对齐单章大纲规划
      - 对齐角色人设
      - 对齐主角能力提升路径
      - 对齐主线核心矛盾
      - 跨章节修改需校验 L1 阶段总结连贯性
    post_sync:
      - 更新对应 L2 章节记忆
      - 更新伏笔台账
    mid_phase3_adaptation:
      rule: |
        若在Phase3创作断点处修改：
        - 已生成章节：仅同步更新记忆标记，原文不改动
        - 未生成后续章节：强制套用修改后全套约束逻辑
        若在Phase2创作启动前修改：
        - 后续全量章节统一套用修改后约束
    forbidden:
      - 私自变更主角变强逻辑
      - 弱化主线核心矛盾

  branch_2_polish:
    name: "文本质感润色打磨"
    description: "零剧情、零人设、零伏笔、零时间线改动，仅优化文本表层表达"
    ai_cleanup_rules:
      - 删除高频AI废词：此刻、见状、不由得、随即、不禁、仿佛、宛如、油然而生、心潮澎湃
      - 打散对称式四字成语堆砌
      - 优化"的"字冗余密度（单句不超过2个"的"）
      - 丰富长短句交替
      - 补充轻量化场景口语化表达
    style_lock: |
      全程锁定全文初始文风参数，杜绝文风割裂。
      修订后文本必须与原文风格一致，不得引入新的文风特征。

# ============================================================
# 时序与算力适配规则
# ============================================================
timing_rules:
  availability:
    phase0: "禁用"
    phase1: "禁用"
    phase2_after_settings: "永久解锁"
    phase3_writing: "可用（独立触发，不暂停主创作线程）"
    phase4_validation: "可用"

  internal_order: "强制自上而下：基础设定 -> 大纲 -> 正文，禁止逆向"

  parallel_isolation:
    rule: |
      调用三级修订时，独立读写修订副本，不直接覆盖原文件。
      校验无逻辑冲突后批量原子替换，防止创作读写冲突。

  snapshot_resume:
    trigger: "Phase3每完成1章自动留存全局快照"
    snapshot_content:
      - 已生成章节清单
      - 三层记忆全集
      - 当前14份设定文件
      - 伏笔台账
      - 写作计划游标
    resume_rule: |
      修订完成后自动读取快照创作游标，跳过全部已完成章节，
      复用原有算力模式直接继续串行/并行创作，会话无重启、上下文无断层。

  chapter_status_handling:
    completed: "仅同步更新L1/L2记忆索引、伏笔台账，原文永久锁定不改动"
    pending: "全量套用修订后的世界观、人设、能力路径、主线矛盾、大纲约束"
    draft: "直接回滚重写"

# ============================================================
# 三平台算力差异化适配
# ============================================================
platform_adaptation:
  claude_code:
    revision_modes: "全量支持"
    parallel: "Agent Teams多Agent并行批量修订，支持跨10章以上批量修改"
  codex:
    revision_modes: "全量支持"
    parallel: "关闭Agent Teams，仅支持逐章串行、小规模子Agent并行修订"
  trae:
    revision_modes: "全量支持"
    parallel: "关闭Agent Teams，仅支持逐章串行、小规模子Agent并行修订"

# ============================================================
# 异常兜底机制
# ============================================================
error_handling:
  memory_load_failure:
    action: "自动降级兜底读取L3上章原文，自动修复损坏记忆分片"
    user_notify: false

  over_limit_modification:
    action: "输出合规替代方案，标注风险点位，不直接拒绝"

  rewrite_exceed_limit:
    max_retries: 3
    action: "超限后终止自动修复，输出异常报告交由用户决策"

  session_interrupt:
    action: "触发Phase0中断检测逻辑，自动恢复原有记忆与设定文件，支持断点续改"
